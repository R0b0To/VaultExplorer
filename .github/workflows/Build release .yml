name: Build & Release APK

on:
  push:
    tags:
      - 'v*'           # triggers on version tags like v1.0.0
  workflow_dispatch:   # allows manual runs from the Actions tab

jobs:
  build:
    name: Build Signed APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java ────────────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── Flutter ─────────────────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # ── Keystore ────────────────────────────────────────────────────────────
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=release.keystore
          EOF

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Build release APKs (Split per ABI)
        run: flutter build apk --release --split-per-abi

      # ── Rename with version ──────────────────────────────────────────────────
      - name: Rename APKs
        run: |
          # Extract version from pubspec.yaml
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr '+' '-')
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          
          # Create a directory to store the renamed APKs
          mkdir -p release-apks
          
          # Loop through all generated ABI-specific APKs
          for apk in build/app/outputs/flutter-apk/app-*-release.apk; do
            # Extract filename without the .apk extension (e.g., app-arm64-v8a-release)
            filename=$(basename "$apk" .apk)
            
            # Extract the ABI by removing the 'app-' prefix and '-release' suffix
            abi=$(echo "$filename" | sed 's/^app-//' | sed 's/-release$//')
            
            # Copy and rename: vaultexplorer-1.0.0-arm64-v8a.apk
            cp "$apk" "release-apks/vaultexplorer-${VERSION}-${abi}.apk"
          done

      # ── Upload artifact (always) ──────────────────────────────────────────────
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VaultExplorer-${{ env.APP_VERSION }}-APKs
          path: release-apks/*.apk
          retention-days: 30

      # ── Create GitHub Release (tag pushes only) ───────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: VaultExplorer ${{ github.ref_name }}
          files: release-apks/*.apk
          generate_release_notes: true   # auto-generates changelog from commits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Cleanup keystore ─────────────────────────────────────────────────────
      - name: Remove keystore
        if: always()
        run: |
          rm -f android/app/release.keystore
          rm -f android/key.properties