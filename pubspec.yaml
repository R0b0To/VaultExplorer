name: vaultexplorer
description: "A new Flutter project."
publish_to: 'none'
version: 0.80.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  path_provider: ^2.1.3
  video_player: ^2.11.1
  fvp: ^0.37.2 # FFmpeg-backed drop-in engine replacement for video_player
  local_auth: ^2.3.0
  pointycastle: ^3.6.2
  flutter_secure_storage: 10.3.1
  encrypt: ^5.0.3
  url_launcher:  ^6.3.2
  wakelock_plus: ^1.5.2
  package_info_plus: ^9.0.1
  vector_math: ^2.1.4
  archive: ^4.0.4      # ZIP/TAR/GZ archive parsing (pure Dart)
  path: ^1.9.0          # Path manipulation for archive entry paths

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4 
  

flutter:
  uses-material-design: true
  assets:
    - assets/images/app_icon.png

flutter_launcher_icons:
  android: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#FFFFFF" # Background color or path to a background image
  adaptive_icon_foreground: "assets/images/app_icon.png"  
