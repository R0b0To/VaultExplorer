name: vaultexplorer
description: "A new Flutter project."
publish_to: 'none'
version: 0.8.2+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^10.3.10 # To select the VeraCrypt container
  permission_handler: ^11.0.0 # To handle storage permissions
  path_provider: ^2.1.3
  video_player: ^2.11.1
  fvp: ^0.37.2 # FFmpeg-backed drop-in engine replacement for video_player

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4 

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  image_path: "assets/images/app_icon.png"
  
  # Highly recommended for modern Android devices (Android 8.0+)
  # to prevent your icon from having awkward white/black borders:
  adaptive_icon_background: "#FFFFFF" # Background color or path to a background image
  adaptive_icon_foreground: "assets/images/app_icon.png"  
