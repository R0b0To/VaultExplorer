name: vaultexplorer
description: "A new Flutter project."
publish_to: 'none'
version: 0.8.23+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^10.3.10 # To select the VeraCrypt container
  permission_handler: ^11.0.0 # To handle storage permissions
  path_provider: ^2.1.3
  video_player: ^2.11.1
  fvp: ^0.37.2 # FFmpeg-backed drop-in engine replacement for video_player
  get_thumbnail_video: ^0.7.3
  local_auth: ^2.3.0
  pointycastle: ^3.6.2
  flutter_secure_storage: 10.3.1
  encrypt: ^5.0.3
  url_launcher:  ^6.3.2
  wakelock_plus: ^1.5.2
  package_info_plus: ^9.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4 
  

flutter:
  uses-material-design: true
  assets:
    - assets/images/app_icon.png

flutter_launcher_icons:
  android: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#FFFFFF" # Background color or path to a background image
  adaptive_icon_foreground: "assets/images/app_icon.png"  
