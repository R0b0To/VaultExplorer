name: cryptbridge
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^10.3.10 # To select the VeraCrypt container
  permission_handler: ^11.0.0 # To handle storage permissions
  path_provider: ^2.1.3
  video_player: ^2.11.1
  fvp: ^0.37.2 # FFmpeg-backed drop-in engine replacement for video_player

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
